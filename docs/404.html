<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found · Test Data Generator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ══════════════════════════════════════════════════════════
       THEME VARIABLES — all colours live here, nowhere else
       ═══════════════════════════════════════════════════════════ */

    /* Dark (default) */
    :root, [data-theme="dark"] {
      --bg-deep:     #07071a;
      --bg-surface:  #0f0f26;
      --bg-raised:   #161630;
      --bg-card:     #1c1c3a;
      --bg-hover:    #232346;
      --bg-active:   #2b2b58;
      --accent:      #6c63ff;
      --accent-2:    #a78bfa;
      --accent-glow: rgba(108,99,255,.32);
      --border:      rgba(255,255,255,.07);
      --border-hi:   rgba(108,99,255,.4);
      --text:        #e2e8f0;
      --text-sub:    #94a3b8;
      --text-muted:  #475569;
      --dot:         rgba(255,255,255,.022);
      --blob-a:      rgba(108,99,255,.13);
      --blob-b:      rgba(34,211,238,.07);
    }

    /* Light */
    [data-theme="light"] {
      --bg-deep:     #f0f2f7;
      --bg-surface:  #ffffff;
      --bg-raised:   #f8f9fc;
      --bg-card:     #f0f2f7;
      --bg-hover:    #e8eaf0;
      --bg-active:   #dde0ea;
      --accent:      #5b52e8;
      --accent-2:    #7c6fdb;
      --accent-glow: rgba(91,82,232,.22);
      --border:      rgba(0,0,0,.09);
      --border-hi:   rgba(91,82,232,.35);
      --text:        #1a1a2e;
      --text-sub:    #4a5068;
      --text-muted:  #8890a4;
      --dot:         rgba(0,0,0,.04);
      --blob-a:      rgba(91,82,232,.07);
      --blob-b:      rgba(20,184,166,.05);
    }

    /* Purple */
    [data-theme="purple"] {
      --bg-deep:     #0d0618;
      --bg-surface:  #160d28;
      --bg-raised:   #1e1235;
      --bg-card:     #261842;
      --bg-hover:    #2e1e50;
      --bg-active:   #3a2665;
      --accent:      #c084fc;
      --accent-2:    #e879f9;
      --accent-glow: rgba(192,132,252,.35);
      --border:      rgba(192,132,252,.12);
      --border-hi:   rgba(232,121,249,.45);
      --text:        #f0e6ff;
      --text-sub:    #c4b5fd;
      --text-muted:  #7c6fb0;
      --dot:         rgba(192,132,252,.03);
      --blob-a:      rgba(192,132,252,.14);
      --blob-b:      rgba(232,121,249,.07);
    }

    /* Midnight */
    [data-theme="midnight"] {
      --bg-deep:     #000510;
      --bg-surface:  #040e1e;
      --bg-raised:   #08162c;
      --bg-card:     #0d1f3c;
      --bg-hover:    #122548;
      --bg-active:   #183060;
      --accent:      #38bdf8;
      --accent-2:    #7dd3fc;
      --accent-glow: rgba(56,189,248,.3);
      --border:      rgba(56,189,248,.1);
      --border-hi:   rgba(56,189,248,.4);
      --text:        #e0f2fe;
      --text-sub:    #7dd3fc;
      --text-muted:  #2563a8;
      --dot:         rgba(56,189,248,.025);
      --blob-a:      rgba(56,189,248,.1);
      --blob-b:      rgba(99,102,241,.06);
    }

    /* ══════════════════════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════════════════════ */

    html, body { height: 100%; overflow: hidden; font-family: -apple-system,'Segoe UI',BlinkMacSystemFont,system-ui,sans-serif; color: var(--text); }

    body {
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-deep);
      background-image:
        radial-gradient(ellipse at 22% 18%, var(--blob-a) 0%, transparent 50%),
        radial-gradient(ellipse at 78% 82%, var(--blob-b) 0%, transparent 50%),
        radial-gradient(var(--dot) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 26px 26px;
      transition: background-color .3s;
    }

    .app-window {
      width: 96vw; height: 92vh;
      display: flex; flex-direction: column;
      background: var(--bg-surface);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.09);
      box-shadow: 0 0 0 1px rgba(108,99,255,.14), 0 40px 100px rgba(0,0,0,.6), 0 10px 32px rgba(0,0,0,.4);
      overflow: hidden;
      transition: background .3s, border-color .3s;
    }
    [data-theme="light"] .app-window {
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.08);
    }

    /* ── Title bar ─────────────────────────────────────────────────────────── */
    .title-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 22px; background: var(--bg-raised);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .title-left  { display: flex; align-items: center; gap: 10px; }
    .title-right { display: flex; align-items: center; gap: 14px; }
    .title-bar h1 { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .logo  { font-size: 19px; }
    .badge {
      font-size: 9px; font-weight: 800; color: var(--accent-2);
      background: rgba(108,99,255,.15); border: 1px solid rgba(108,99,255,.28);
      border-radius: 20px; padding: 3px 9px; letter-spacing: .8px; text-transform: uppercase;
    }
    [data-theme="light"] .badge  { background: rgba(91,82,232,.1); border-color: rgba(91,82,232,.25); }
    [data-theme="purple"] .badge { background: rgba(192,132,252,.15); border-color: rgba(192,132,252,.3); }
    [data-theme="midnight"] .badge { background: rgba(56,189,248,.1); border-color: rgba(56,189,248,.25); color: var(--accent-2); }

    .shortcut-hint { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    kbd {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px;
      padding: 1px 6px; font-size: 10px; font-family: 'Consolas','Courier New',monospace; color: var(--text-sub);
    }

    /* ── Theme toggle ──────────────────────────────────────────────────────── */
    #themeToggle { position: relative; }
    .theme-btn {
      display: flex; align-items: center; gap: 6px; padding: 6px 11px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; color: var(--text-sub);
      font-size: 12px; font-weight: 600; transition: all .16s;
    }
    .theme-btn:hover { border-color: var(--border-hi); color: var(--text); background: var(--bg-hover); }
    .theme-btn-icon { font-size: 14px; line-height: 1; }
    .theme-chevron  { font-size: 9px; opacity: .6; }
    .theme-menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--bg-raised); border: 1px solid var(--border-hi);
      border-radius: 10px; overflow: hidden; min-width: 140px;
      box-shadow: 0 8px 28px rgba(0,0,0,.4);
      opacity: 0; transform: translateY(-6px) scale(.97);
      pointer-events: none; transition: opacity .16s, transform .16s;
      z-index: 100;
    }
    .theme-menu.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .theme-option {
      display: flex; align-items: center; gap: 9px; padding: 9px 14px;
      background: none; border: none; width: 100%; text-align: left;
      font-size: 12px; font-weight: 600; color: var(--text-sub); cursor: pointer;
      transition: background .14s, color .14s;
    }
    .theme-option:hover { background: var(--bg-hover); color: var(--text); }
    .theme-option.active { color: var(--accent-2); }
    .theme-tick { margin-left: auto; font-size: 10px; color: var(--accent); }

    /* ── Content ─────────────────────────────────────────────────────────── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .icon {
      font-size: 80px;
      margin-bottom: 24px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .description {
      font-size: 16px;
      color: var(--text-sub);
      margin-bottom: 32px;
      max-width: 500px;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform .18s, box-shadow .18s;
    }
    .btn:hover:not(:disabled)  { transform: translateY(-2px); box-shadow: 0 6px 24px var(--accent-glow); }
    .btn:active:not(:disabled) { transform: scale(.97); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      padding: 10px 22px; background: var(--bg-active); color: var(--text);
      border-radius: 12px; font-size: 13px; font-weight: 600;
      box-shadow: 0 8px 30px rgba(0,0,0,.4), 0 0 0 1px var(--border-hi);
      opacity: 0; transition: opacity .2s, transform .2s; z-index: 1000; pointer-events: none;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(128,128,128,.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,.35); }

    @media (max-width:1100px){ .subtypes-panel{width:195px} .config-panel{width:275px} }
    @media (max-width:820px) { .subtypes-panel{width:165px} .config-panel{width:240px} }
    @media (max-width: 720px) {
      html, body { height: auto; overflow: auto; }
      body { display: block; }
      .app-window { width: 100%; height: auto; min-height: 100vh; border-radius: 0; border: none; box-shadow: none; }
      .title-bar { padding: 10px 14px; flex-wrap: wrap; gap: 10px; }
      .title-bar h1 { font-size: 13px; gap: 6px; }
      .shortcut-hint { display: none; }
      .content { padding: 40px 20px; }
      .icon { font-size: 64px; }
      .title { font-size: 22px; }
      .description { font-size: 14px; max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app-window">

    <!-- Title bar -->
    <div class="title-bar">
      <div class="title-left">
        <h1>
          <span class="logo">🎲</span>
          Test Data Generator
          <span class="badge">QA Tools</span>
        </h1>
      </div>
      <div class="title-right">
        <span class="shortcut-hint">Generate <kbd>Ctrl</kbd>+<kbd>Enter</kbd></span>
        <!-- Theme toggle (rendered by theme.js) -->
        <div id="themeToggle"></div>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="icon">🔍</div>
      <div class="title">Page Not Found</div>
      <div class="description">
        The page you're looking for doesn't exist or has been moved.
        Please check the URL and try again, or return to the homepage.
      </div>
      <a href="./index.html" class="btn">
        <span>🏠</span> Go to Homepage
      </a>
    </div>

  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
